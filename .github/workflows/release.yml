name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: frontend
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          
      - name: Install Backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          
      - name: Build App (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python scripts/build_for_windows.py
          powershell Compress-Archive -Path releases/SpotifySmartDownloader-Windows -DestinationPath releases/SpotifySmartDownloader-Windows.zip
          
      - name: Build App (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          python3 scripts/build_for_macos.py
          cd releases
          zip -r SpotifySmartDownloader-macOS.zip SpotifySmartDownloader.app
          
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            releases/*.zip
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
