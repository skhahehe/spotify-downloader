name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: frontend
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          
      - name: Install Backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          
      - name: Build Windows App
        run: python scripts/build_for_windows.py
        
      - name: Zip Windows Release
        run: |
          powershell Compress-Archive -Path releases/SpotifySmartDownloader-Windows -DestinationPath releases/SpotifySmartDownloader-Windows.zip
          
      - name: Create Release (Windows)
        uses: softprops/action-gh-release@v2
        with:
          files: releases/SpotifySmartDownloader-Windows.zip
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: frontend
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          
      - name: Install Backend dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r backend/requirements.txt
          
      - name: Build macOS App
        run: python3 scripts/build_for_macos.py
        
      - name: Zip macOS Release
        run: |
          cd releases
          zip -r SpotifySmartDownloader-macOS.zip SpotifySmartDownloader.app
          
      - name: Create Release (macOS)
        uses: softprops/action-gh-release@v2
        with:
          files: releases/SpotifySmartDownloader-macOS.zip
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
